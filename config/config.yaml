# ═══════════════════════════════════════════════════════════════
#                    TrendRadar 配置文件
#                      Version: 2.4.0（中间路线版）
# ═══════════════════════════════════════════════════════════════


# 可视化配置编辑器地址: https://sansan0.github.io/TrendRadar/


# ===============================================================
# 1. 基础设置
# ===============================================================
app:
  timezone: "Asia/Shanghai"
  show_version_update: true


# ===============================================================
# 1.5 调度系统
# ===============================================================
schedule:
  enabled: false
  preset: "morning_evening"


# ===============================================================
# 2. 数据源 - 热榜平台（重点修改：关掉纯股市快讯）
# ===============================================================
platforms:
  enabled: true
  api_url: ""
  sources:
  # === 科技数码 & 极客文化（全部保留）===
  - id: "ithome"
    name: "【科技】IT之家"
  - id: "sspai"
    name: "【科技】少数派"
  - id: "v2ex"
    name: "【科技】V2EX"
  - id: "juejin"
    name: "【科技】稀土掘金"
  - id: "producthunt"
    name: "【科技】ProductHunt"

  # === 财经宏观（只留综合性宏观，关掉纯A股/外汇快讯）===
  - id: "wallstreetcn-news"
    name: "华尔街见闻 (宏观/全球)"
  # - id: "cls-telegraph"      # ✅ 已屏蔽：财联社（纯A股电报）
  # - id: "jin10"              # ✅ 已屏蔽：金十数据（纯外汇/期货）
  - id: "36kr-quick"
    name: "36氪 (创投/科技产业)"


# ===============================================================
# 3. RSS 订阅（禁用雅虎财经，保留 Hacker News）
# ===============================================================
rss:
  enabled: true
  freshness_filter:
    enabled: true
    max_age_days: 1
  feeds:
    - id: "hacker-news"
      name: "Hacker News (全球极客前沿)"
      url: "https://hnrss.org/frontpage"
    - id: "yahoo-finance"
      name: "雅虎财经"
      url: "https://finance.yahoo.com/news/rssindex"
      enabled: false           # ✅ 彻底禁用


# ===============================================================
# 4. 报告模式（强制限制总条数）
# ===============================================================
report:
  mode: "daily"
  display_mode: "keyword"
  sort_by_position_first: false
  rank_threshold: 5
  max_news_per_keyword: 1      # ✅ 每个标签只留1条，总条数=规则数（约40条）


# ===============================================================
# 4.5 筛选策略
# ===============================================================
filter:
  method: "keyword"
  priority_sort_enabled: true


# ===============================================================
# 5. 推送内容控制（开启“新增热点”作为安全网）
# ===============================================================
display:
  region_order:
    - new_items                # ✅ 1️⃣ 开启新增热点（让你看到未被关键词命中的新东西，防茧房）
    - hotlist                  # 2️⃣ 关键词匹配区
    - rss                      # 3️⃣ RSS区
    - standalone
    - ai_analysis

  regions:
    hotlist: true
    new_items: true            # ✅ 开启后，即使没命中关键词的全网爆点也会带🆕标给你瞄一眼
    rss: true
    standalone: false
    ai_analysis: true

  standalone:
    platforms: []
    rss_feeds: []
    max_items: 20


# ===============================================================
# 6. 推送通知（保持你的配置）
# ===============================================================
notification:
  enabled: true
  channels:
    feishu:
      webhook_url: ""
    # ... 其他渠道留空


# ===============================================================
# 7-11. 以下保持默认，与中间路线无关
# ===============================================================
storage:
  backend: "auto"
  formats:
    sqlite: true
    txt: false
    html: true
  local:
    data_dir: "output"
    retention_days: 0
  remote:
    retention_days: 0
    endpoint_url: ""
    bucket_name: ""
    access_key_id: ""
    secret_access_key: ""
    region: ""
  pull:
    enabled: false
    days: 7

ai:
  model: "deepseek/deepseek-v4-flash"
  api_key: ""
  api_base: ""
  timeout: 120
  temperature: 1.0
  max_tokens: 5000
  num_retries: 1
  fallback_models: []

ai_analysis:
  enabled: true
  language: "Chinese"
  prompt_file: "ai_analysis_prompt.txt"
  mode: "follow_report"
  max_news_for_analysis: 150
  include_rss: false
  include_standalone: true
  include_rank_timeline: true

ai_translation:
  enabled: true
  language: "中文"
  prompt_file: "ai_translation_prompt.txt"
  batch_size: 100
  batch_interval: 2
  scope:
    hotlist: false
    rss: true
    standalone: true

advanced:
  debug: false
  version_check_url: "https://raw.githubusercontent.com/sansan0/TrendRadar/refs/heads/master/version"
  mcp_version_check_url: "https://raw.githubusercontent.com/sansan0/TrendRadar/refs/heads/master/version_mcp"
  configs_version_check_url: "https://raw.githubusercontent.com/sansan0/TrendRadar/refs/heads/master/version_configs"
  crawler:
    request_interval: 2000
    use_proxy: false
    default_proxy: "http://127.0.0.1:10801"
  rss:
    request_interval: 1000
    timeout: 15
    use_proxy: false
    proxy_url: ""
  weight:
    rank: 0.6
    frequency: 0.3
    hotness: 0.1
  max_accounts_per_channel: 3
  batch_size:
    default: 4000
    dingtalk: 20000
    feishu: 30000
    bark: 4000
    slack: 4000
  batch_send_interval: 3
  feishu_message_separator: "━━━━━━━━━━━━━━━━"
